<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cuenta">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Cuenta compartida</title>
  <style>
    :root{
      --bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--muted:#636366;
      --line:#d1d1d6;--blue:#007aff;--red:#b42318;--green:#0f5132
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      padding:max(14px,env(safe-area-inset-top)) 14px max(24px,env(safe-area-inset-bottom))
    }
    main{max-width:720px;margin:auto}
    h1{text-align:center;font-size:25px;margin:8px 0 16px}
    h2{font-size:19px;margin:0 0 12px}
    .card{background:var(--card);border-radius:16px;padding:15px;margin-bottom:14px}
    label{display:block;font-weight:600;margin:7px 0 6px}
    input{
      width:100%;min-height:48px;border:1px solid var(--line);
      border-radius:11px;padding:12px;font-size:16px;background:white;margin-bottom:10px
    }
    button{
      min-height:46px;border:0;border-radius:11px;padding:11px 14px;
      font-size:16px;font-weight:600;background:var(--blue);color:white;
      touch-action:manipulation
    }
    button.full{width:100%}
    button.danger{background:#ffebee;color:var(--red);min-height:38px;font-size:14px}
    button.secondary{background:#e5e5ea;color:var(--text);width:100%;margin-top:10px}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
    .item{padding:10px 0;border-bottom:1px solid #e5e5ea}
    .item:last-child{border-bottom:0}
    .item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .muted{color:var(--muted);font-size:14px}
    .checks{display:flex;flex-wrap:wrap;gap:7px;margin:9px 0 12px}
    .checks label{margin:0;font-weight:400;background:#f2f2f7;padding:9px;border-radius:9px}
    .checks input{width:auto;min-height:auto;margin:0 5px 0 0}
    .result{background:#f2f2f7;border-radius:11px;padding:13px;margin-bottom:9px}
    .line{display:flex;justify-content:space-between;gap:10px;margin-top:5px}
    .total{font-weight:700;border-top:1px solid var(--line);padding-top:7px;margin-top:7px}
    .status{padding:10px;border-radius:10px;margin-bottom:12px;background:#d1e7dd;color:var(--green)}
    .hidden{display:none}
  </style>
</head>
<body>
<main>
  <h1>💰 Cuenta compartida</h1>
  <div id="status" class="status">Calculadora lista.</div>

  <section class="card">
    <h2>1. Personas</h2>
    <div class="row">
      <input id="personName" type="text" placeholder="Nombre de la persona" autocomplete="off">
      <button id="addPerson" type="button">Agregar</button>
    </div>
    <div id="personList"><p class="muted">Aún no hay personas.</p></div>
  </section>

  <section class="card">
    <h2>2. Plato o producto</h2>
    <label for="productName">Nombre</label>
    <input id="productName" type="text" placeholder="Ej.: Albacora frita" autocomplete="off">

    <label for="productPrice">Precio total</label>
    <input id="productPrice" type="number" inputmode="numeric" min="1" placeholder="Ej.: 5000">

    <p class="muted">Marca quiénes consumieron este producto:</p>
    <div id="consumerChecks" class="checks"><span class="muted">Primero agrega personas.</span></div>
    <button id="addProduct" class="full" type="button">Agregar plato</button>
  </section>

  <section class="card">
    <h2>3. Productos</h2>
    <div id="productList"><p class="muted">Aún no hay productos.</p></div>
  </section>

  <section class="card">
    <h2>4. Resultado</h2>
    <label for="tip">Propina (%)</label>
    <input id="tip" type="number" inputmode="decimal" min="0" value="10">
    <div id="results"><p class="muted">Agrega personas y productos.</p></div>
    <button id="clearAll" class="secondary" type="button">Limpiar todo</button>
  </section>
</main>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  let people = [];
  let products = [];

  const money = n => "$" + Math.round(n).toLocaleString("es-CL");
  const setStatus = text => { $("status").textContent = text; };

  function renderPeople(){
    const list = $("personList");
    const checks = $("consumerChecks");
    list.innerHTML = "";
    checks.innerHTML = "";

    if(!people.length){
      list.innerHTML = '<p class="muted">Aún no hay personas.</p>';
      checks.innerHTML = '<span class="muted">Primero agrega personas.</span>';
      return;
    }

    people.forEach((name,index)=>{
      const row=document.createElement("div");
      row.className="item item-head";
      const span=document.createElement("strong");
      span.textContent=name;
      const btn=document.createElement("button");
      btn.type="button"; btn.className="danger"; btn.textContent="Quitar";
      btn.addEventListener("click",()=>{
        people.splice(index,1);
        products.forEach(p=>{
          p.people=p.people.filter(i=>i!==index).map(i=>i>index?i-1:i);
        });
        renderAll();
      });
      row.append(span,btn); list.appendChild(row);

      const label=document.createElement("label");
      const cb=document.createElement("input");
      cb.type="checkbox"; cb.value=index;
      label.append(cb,document.createTextNode(name));
      checks.appendChild(label);
    });
  }

  function addPerson(){
    const input=$("personName");
    const name=input.value.trim();
    if(!name){ setStatus("Escribe un nombre."); input.focus(); return; }
    if(people.some(p=>p.toLowerCase()===name.toLowerCase())){
      setStatus("Esa persona ya está agregada."); return;
    }
    people.push(name); input.value="";
    renderAll(); setStatus("Persona agregada.");
  }

  function addProduct(){
    const name=$("productName").value.trim();
    const price=Number($("productPrice").value);
    const selected=[...$("consumerChecks").querySelectorAll('input[type="checkbox"]:checked')]
      .map(cb=>Number(cb.value));

    if(!name){ setStatus("Escribe el nombre del plato."); return; }
    if(!Number.isFinite(price)||price<=0){ setStatus("Ingresa un precio válido."); return; }
    if(!selected.length){ setStatus("Marca al menos una persona."); return; }

    products.push({name,price,people:selected});
    $("productName").value=""; $("productPrice").value="";
    $("consumerChecks").querySelectorAll("input").forEach(cb=>cb.checked=false);
    renderAll(); setStatus("Plato agregado.");
  }

  function renderProducts(){
    const list=$("productList");
    list.innerHTML="";
    if(!products.length){
      list.innerHTML='<p class="muted">Aún no hay productos.</p>'; return;
    }
    products.forEach((p,index)=>{
      const item=document.createElement("div");
      item.className="item";
      const head=document.createElement("div");
      head.className="item-head";
      const left=document.createElement("div");
      const strong=document.createElement("strong");
      strong.textContent=p.name;
      const names=document.createElement("div");
      names.className="muted";
      names.textContent=p.people.map(i=>people[i]).filter(Boolean).join(", ");
      left.append(strong,names);
      const right=document.createElement("div");
      const price=document.createElement("div");
      price.style.fontWeight="700"; price.textContent=money(p.price);
      const btn=document.createElement("button");
      btn.type="button"; btn.className="danger"; btn.textContent="Quitar";
      btn.addEventListener("click",()=>{products.splice(index,1);renderAll();});
      right.append(price,btn); head.append(left,right); item.appendChild(head); list.appendChild(item);
    });
  }

  function calculate(){
    const box=$("results");
    if(!people.length){
      box.innerHTML='<p class="muted">Agrega personas y productos.</p>'; return;
    }
    const subtotals=people.map(()=>0);
    products.forEach(p=>{
      if(!p.people.length)return;
      const share=p.price/p.people.length;
      p.people.forEach(i=>{if(subtotals[i]!==undefined)subtotals[i]+=share;});
    });
    let tip=Number($("tip").value);
    if(!Number.isFinite(tip)||tip<0)tip=0;
    box.innerHTML="";
    people.forEach((name,i)=>{
      const tipValue=subtotals[i]*tip/100;
      const total=subtotals[i]+tipValue;
      const card=document.createElement("div");
      card.className="result";
      const title=document.createElement("strong"); title.textContent=name;
      card.appendChild(title);
      [["Subtotal",subtotals[i]],["Propina ("+tip+"%)",tipValue],["Total a pagar",total]]
      .forEach((row,idx)=>{
        const div=document.createElement("div");
        div.className="line"+(idx===2?" total":"");
        const a=document.createElement("span"); a.textContent=row[0];
        const b=document.createElement("span"); b.textContent=money(row[1]);
        div.append(a,b); card.appendChild(div);
      });
      box.appendChild(card);
    });
  }

  function renderAll(){renderPeople();renderProducts();calculate();}

  $("addPerson").addEventListener("click",addPerson);
  $("personName").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addPerson();}});
  $("addProduct").addEventListener("click",addProduct);
  $("tip").addEventListener("input",calculate);
  $("clearAll").addEventListener("click",()=>{
    if(confirm("¿Borrar todas las personas y productos?")){
      people=[];products=[];$("tip").value="10";renderAll();setStatus("Calculadora reiniciada.");
    }
  });

  renderAll();

  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  }
})();
</script>
</body>
</html>
